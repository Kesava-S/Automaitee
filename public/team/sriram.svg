<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#00008B" />
  <circle cx="100" cy="100" r="40" fill="#00FF00">
    <animate attributeName="r" values="30; 45; 30" dur="2s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#00FF00; #00FFFF; #00FF00" dur="4s" repeatCount="indefinite" />
  </circle>
  <text x="50%" y="50%" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="24" font-weight="bold" dy=".3em">Sriram</text>
</svg>
